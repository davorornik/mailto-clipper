<!doctype html>
<html>
<head><meta charset="UTF-8"><title data-i18n="popup_title"></title>
<link rel="stylesheet" href="popup.css"></head>
<body>
<div class="container">
  <header class="header">
    <span class="title" data-i18n="extension_name"></span>
    <button id="scanBtn" class="btn" data-i18n="scan">Scan</button>
  </header>
  <div id="statusBar" class="status hidden"><span id="statusText"></span></div>
  <div id="emailList" class="email-list"><div id="emptyState" class="empty" data-i18n="no_emails">No emails found</div></div>
  <div class="settings">
    <label class="toggle"><input type="checkbox" id="replaceCheck"><span data-i18n="intercept">Intercept mailto</span></label>
  </div>
</div>
<div id="toast" class="toast hidden"></div>
<script src="popup.js"></script>
</body>
</html>
