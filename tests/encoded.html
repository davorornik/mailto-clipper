<body>
  <h1>Encoded Emails Test</h1>
  <p>Test email encoding (%40 = @):</p>
  <ul>
    <li><a href="mailto:user%40example.com">user%40example.com</a></li>
    <li><a href="mailto:test%40mail.example.com">test%40mail.example.com</a></li>
    <li><a href="mailto:first.last@example.org">first.last@example.org</a></li>
  </ul>
</body>
